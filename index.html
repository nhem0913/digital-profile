<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoàng Thị Hải Anh - Digital Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 34px;
            padding: 40px 36px 36px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 24px 70px rgba(149, 76, 233, 0.18);
            text-align: center;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 28px;
            border: 5px solid #fbbf24;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(251, 191, 36, 0.25);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #9333ea;
            font-size: 30px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .title {
            color: #d946ef;
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .company {
            color: #a78bfa;
            font-size: 14px;
            margin-bottom: 28px;
            font-style: italic;
        }

        .socials {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .facebook {
            background: linear-gradient(135deg, #c084fc 0%, #a78bfa 100%);
        }

        .zalo {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        }

        .linkedin {
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
        }

        .social-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
        }

        .message-section {
            background: #ffffff;
            border-radius: 28px;
            padding: 28px 24px;
            margin-top: 30px;
            box-shadow: 0 16px 46px rgba(167, 139, 250, 0.14);
            text-align: left;
        }

        .message-section h3 {
            color: #7c3aed;
            font-size: 22px;
            margin-bottom: 18px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #5b21b6;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(167, 139, 250, 0.5);
            border-radius: 18px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            transition: all 0.25s ease;
            box-sizing: border-box;
            background: #faf5ff;
            color: #2d2d2d;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #c084fc;
            box-shadow: 0 0 12px rgba(192, 132, 250, 0.18);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #a78bfa 0%, #9333ea 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(147, 51, 234, 0.24);
            width: 100%;
            margin-top: 6px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(147, 51, 234, 0.32);
        }

        .feedback {
            margin-top: 16px;
            min-height: 22px;
            font-size: 14px;
            color: #4c1d95;
            text-align: center;
        }

        .note {
            font-size: 13px;
            color: #7c3aed;
            opacity: 0.85;
            margin-top: 12px;
            text-align: center;
        }

        .gift-btn {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.3);
            width: 100%;
            margin-top: 20px;
        }

        .gift-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(249, 115, 22, 0.4);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">
            <img src="https://scontent.fhan14-3.fna.fbcdn.net/v/t39.30808-6/605926480_1354087222859680_3699929218445589501_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=7b2446&_nc_ohc=MGxSvf5mPcgQ7kNvwFcKMje&_nc_oc=Adov6TMyxudguLJ2ML_LL23jfdvbnaPdQ_6uIh_PvTetJEPRvFPqhWqlq8_MwNx5vCc7GaksLQ6C0m5tJ12EOAyG&_nc_zt=23&_nc_ht=scontent.fhan14-3.fna&_nc_gid=HBuUMX0swEXRDGoK97LxOA&_nc_ss=7a3a8&oh=00_Af2tjgj4paFRj2-d0J0cwRHy495TlYvW-Iln4hB2yLrPYg&oe=69DD14B8" alt="Hoàng Thị Hải Anh">
        </div>
        <h1>Hoàng Thị Hải Anh</h1>
        <p class="title">Chuyên viên Phát triển cộng đồng</p>
        <p class="company">JOYWORK</p>

        <div class="socials">
            <a href="https://www.facebook.com/hat.vung.673299/" class="social-btn facebook" title="Facebook" target="_blank" rel="noopener noreferrer">f</a>
            <a href="https://zalo.me/0367471097" class="social-btn zalo" title="Zalo" target="_blank" rel="noopener noreferrer">Z</a>
            <a href="https://linkedin.com" class="social-btn linkedin" title="LinkedIn" target="_blank" rel="noopener noreferrer">in</a>
        </div>

        <div class="message-section">
            <h3>📝 Nhắn tin qua Telegram</h3>
            <div class="form-group">
                <label for="senderName">Tên của bạn</label>
                <input type="text" id="senderName" placeholder="Nhập tên của bạn">
            </div>
            <div class="form-group">
                <label for="senderEmail">Email (tuỳ chọn)</label>
                <input type="email" id="senderEmail" placeholder="example@domain.com">
            </div>
            <div class="form-group">
                <label for="senderMessage">Tin nhắn</label>
                <textarea id="senderMessage" placeholder="Viết nội dung tin nhắn..." required></textarea>
            </div>
            <button class="submit-btn" type="button" onclick="sendTelegramMessage()">📨 GỬI TIN</button>
            <p class="note">Trang cần deploy lên Vercel và cấu hình Telegram bot để gửi tin.</p>
            <p class="feedback" id="feedback"></p>
        </div>

        <button class="gift-btn" onclick="createConfetti()">🎁 TẶNG QUÀ</button>
    </div>

    <script>
        async function sendTelegramMessage() {
            const name = document.getElementById('senderName').value.trim();
            const email = document.getElementById('senderEmail').value.trim();
            const message = document.getElementById('senderMessage').value.trim();
            const feedback = document.getElementById('feedback');

            if (!message) {
                feedback.textContent = 'Vui lòng nhập nội dung tin nhắn.';
                return;
            }

            feedback.textContent = 'Đang gửi tin nhắn...';

            try {
                const response = await fetch('/api/send-telegram', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, message })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Không gửi được tin nhắn');
                }

                feedback.textContent = '✅ Tin nhắn đã gửi thành công. Mình sẽ trả lời sớm!';
                document.getElementById('senderMessage').value = '';
                createConfetti();
            } catch (error) {
                feedback.textContent = '⚠️ ' + error.message;
            }
        }

        function createConfetti() {
            const colors = ['#fbbf24', '#f472b6', '#a78bfa', '#fca5a5', '#f59e0b'];
            const confettiCount = 50;

            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animation = 'confettiFall ' + (Math.random() * 2 + 2) + 's ease-out forwards';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0px';
                    document.body.appendChild(confetti);

                    setTimeout(() => {
                        confetti.remove();
                    }, 4000);
                }, i * 30);
            }
        }
    </script>
</body>
</html>
