<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoàng Thị Hải Anh - Digital Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 34px;
            padding: 40px 36px 36px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 24px 70px rgba(149, 76, 233, 0.18);
            text-align: center;
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 15;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 28px;
            border: 5px solid #fbbf24;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(251, 191, 36, 0.25);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #9333ea;
            font-size: 30px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .title {
            color: #d946ef;
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .company {
            color: #a78bfa;
            font-size: 14px;
            margin-bottom: 28px;
            font-style: italic;
        }

        .socials {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .facebook {
            background: linear-gradient(135deg, #c084fc 0%, #a78bfa 100%);
        }

        .zalo {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        }

        .linkedin {
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
        }

        .social-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
        }

        .message-section {
            background: #ffffff;
            border-radius: 28px;
            padding: 28px 24px;
            margin-top: 30px;
            box-shadow: 0 16px 46px rgba(167, 139, 250, 0.14);
            text-align: left;
        }

        .message-section h3 {
            color: #7c3aed;
            font-size: 22px;
            margin-bottom: 18px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #5b21b6;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(167, 139, 250, 0.5);
            border-radius: 18px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            transition: all 0.25s ease;
            box-sizing: border-box;
            background: #faf5ff;
            color: #2d2d2d;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #c084fc;
            box-shadow: 0 0 12px rgba(192, 132, 250, 0.18);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #a78bfa 0%, #9333ea 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(147, 51, 234, 0.24);
            width: 100%;
            margin-top: 6px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(147, 51, 234, 0.32);
        }

        .feedback {
            margin-top: 16px;
            min-height: 22px;
            font-size: 14px;
            color: #4c1d95;
            text-align: center;
        }

        .note {
            font-size: 13px;
            color: #7c3aed;
            opacity: 0.85;
            margin-top: 12px;
            text-align: center;
        }

        .gift-btn {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.3);
            width: 100%;
            margin-top: 20px;
        }

        .gift-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(249, 115, 22, 0.4);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
            z-index: 85;
        }

        .bubble-game-layer {
            position: fixed;
            inset: 0;
            z-index: 60;
            pointer-events: none;
            overflow: hidden;
        }

        .soap-bubble {
            position: fixed;
            bottom: -140px;
            border: 0;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            opacity: 1;
            box-shadow:
                inset 0 0 0 2px rgba(255, 255, 255, 0.85),
                inset -14px -16px 26px rgba(255, 255, 255, 0.36),
                0 14px 34px rgba(139, 92, 246, 0.32),
                0 0 0 1.5px rgba(236, 72, 153, 0.3);
            animation-name: bubbleFloat;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
            transition: transform 0.15s ease;
            display: grid;
            place-items: center;
        }

        .soap-bubble::before {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            top: 14%;
            left: 18%;
            background: rgba(255, 255, 255, 0.82);
            filter: blur(1px);
        }

        .soap-bubble:hover {
            transform: scale(1.08);
        }

        .kitty-burst-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 75;
            overflow: hidden;
        }

        .kitty-ground-layer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 165px;
            pointer-events: none;
            z-index: 65;
            overflow: visible;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(252, 231, 243, 0.55) 70%, rgba(251, 207, 232, 0.7) 100%);
        }

        .score-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 90;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(167, 139, 250, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 7px 14px;
            flex-wrap: wrap;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #7e22ce;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        .score-item .score-val {
            color: #ec4899;
            font-weight: 700;
        }

        .score-sep {
            color: rgba(167, 139, 250, 0.5);
            font-size: 16px;
            line-height: 1;
        }

        .difficulty-select-bar {
            border: 1px solid rgba(167, 139, 250, 0.5);
            border-radius: 8px;
            background: #faf5ff;
            color: #5b21b6;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 8px;
            cursor: pointer;
        }

        .sound-toggle-bar {
            border: 0;
            border-radius: 8px;
            padding: 4px 8px;
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
            color: white;
            font-size: 15px;
            cursor: pointer;
            line-height: 1;
        }

        .sound-toggle-bar.off {
            background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
        }

        .volume-slider-bar {
            width: 72px;
            accent-color: #d946ef;
            cursor: pointer;
        }

        .game-toggle-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 90;
            display: flex;
            justify-content: center;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(167, 139, 250, 0.2);
        }

        .combo-flash-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 95;
            overflow: hidden;
        }

        .combo-flash {
            position: fixed;
            left: 50%;
            top: 34%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.95), rgba(168, 85, 247, 0.95));
            color: #fff;
            font-size: 20px;
            font-weight: 800;
            padding: 10px 16px;
            border-radius: 999px;
            box-shadow: 0 18px 36px rgba(168, 85, 247, 0.35);
            animation: comboFloatUp 0.75s ease forwards;
        }

        .game-toggle {
            border: 0;
            border-radius: 12px;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
            transition: transform 0.2s ease;
        }

        .game-toggle:hover {
            transform: translateY(-1px);
        }

        .game-toggle.off {
            background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
        }

        .kitty-burst {
            position: fixed;
            transform: translate(-50%, -50%);
            display: grid;
            place-items: center;
            width: 100px;
            height: 100px;
            border-radius: 26px;
            background: linear-gradient(145deg, rgba(255, 245, 251, 0.95), rgba(250, 239, 255, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(244, 114, 182, 0.25);
            animation: kittyPop 1.15s ease forwards;
            backdrop-filter: blur(3px);
        }

        .kitty-sticker-img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            filter: drop-shadow(0 6px 10px rgba(244, 114, 182, 0.25));
        }

        .bubble-pop {
            position: fixed;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.25);
            animation: popRing 0.45s ease-out forwards;
            pointer-events: none;
            z-index: 73;
        }

        .kitty-falling {
            position: fixed;
            transform: translate(-50%, -50%);
            z-index: 74;
            pointer-events: none;
            display: grid;
            place-items: center;
            width: 88px;
            height: 88px;
            border-radius: 22px;
            background: rgba(255, 250, 253, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 12px 26px rgba(236, 72, 153, 0.22);
            transition: top 0.9s cubic-bezier(0.2, 0.65, 0.25, 1), transform 0.9s cubic-bezier(0.2, 0.65, 0.25, 1);
        }

        .kitty-landed {
            position: absolute;
            bottom: 6px;
            transform: translateX(-50%);
            display: grid;
            place-items: center;
            width: 74px;
            height: 74px;
            border-radius: 18px;
            background: rgba(255, 250, 253, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 18px rgba(236, 72, 153, 0.2);
            animation: settleBounce 0.55s ease;
        }

        @keyframes bubbleFloat {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
                opacity: 0;
            }
            12% {
                opacity: 0.85;
            }
            50% {
                transform: translate3d(calc(var(--drift-x) * 0.55), -52vh, 0) scale(1.03);
            }
            100% {
                transform: translate3d(var(--drift-x), -122vh, 0) scale(0.98);
                opacity: 0.35;
            }
        }

        @keyframes kittyPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2) rotate(-8deg);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.06) rotate(4deg);
            }
            70% {
                opacity: 1;
                transform: translate(-50%, -64%) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -88%) scale(0.82) rotate(0deg);
            }
        }

        @keyframes popRing {
            to {
                width: 90px;
                height: 90px;
                opacity: 0;
            }
        }

        @keyframes settleBounce {
            0% {
                transform: translateX(-50%) translateY(-28px) scale(0.92);
            }
            62% {
                transform: translateX(-50%) translateY(6px) scale(1.02);
            }
            100% {
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }

        @keyframes comboFloatUp {
            0% {
                opacity: 0;
                transform: translate(-50%, -40%) scale(0.72);
            }
            22% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.06);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -130%) scale(0.95);
            }
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .hidden-sticker-sheet {
            display: none;
        }
    </style>
</head>
<body>
    <img id="stickerSheet" class="hidden-sticker-sheet" alt="sticker sheet">

    <div class="bubble-game-layer" id="bubbleGameLayer"></div>
    <div class="kitty-burst-layer" id="kittyBurstLayer"></div>
    <div class="kitty-ground-layer" id="kittyGroundLayer"></div>
    <div class="combo-flash-layer" id="comboFlashLayer"></div>

    <div id="scoreBar" class="score-bar">
        <div class="score-item"><span>🎯 Điểm</span><span class="score-val" id="scoreValue">0</span></div>
        <span class="score-sep">|</span>
        <div class="score-item"><span>🏆</span><span class="score-val" id="highScoreValue">0</span></div>
        <span class="score-sep">|</span>
        <div class="score-item"><span>🔥 Combo</span><span class="score-val" id="comboValue">x1</span></div>
        <span class="score-sep">|</span>
        <div class="score-item"><span>💥</span><span class="score-val" id="poppedValue">0</span></div>
        <span class="score-sep">|</span>
        <div class="score-item"><span>🐱</span><span class="score-val" id="landedValue">0</span></div>
        <span class="score-sep">|</span>
        <select id="difficultySelect" class="difficulty-select-bar">
            <option value="easy">Dễ</option>
            <option value="medium" selected>Vừa</option>
            <option value="hard">Khó</option>
        </select>
        <button id="soundToggleBtn" class="sound-toggle-bar" type="button">🔊</button>
        <input id="volumeSlider" class="volume-slider-bar" type="range" min="0" max="100" value="75">
    </div>
    <div class="game-toggle-bar">
        <button id="toggleGameBtn" class="game-toggle" type="button">Tắt mini game</button>
    </div>

    <div class="container">
        <div class="avatar">
            <img src="https://scontent.fhan14-3.fna.fbcdn.net/v/t39.30808-6/605926480_1354087222859680_3699929218445589501_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=7b2446&_nc_ohc=MGxSvf5mPcgQ7kNvwFcKMje&_nc_oc=Adov6TMyxudguLJ2ML_LL23jfdvbnaPdQ_6uIh_PvTetJEPRvFPqhWqlq8_MwNx5vCc7GaksLQ6C0m5tJ12EOAyG&_nc_zt=23&_nc_ht=scontent.fhan14-3.fna&_nc_gid=HBuUMX0swEXRDGoK97LxOA&_nc_ss=7a3a8&oh=00_Af2tjgj4paFRj2-d0J0cwRHy495TlYvW-Iln4hB2yLrPYg&oe=69DD14B8" alt="Hoàng Thị Hải Anh">
        </div>
        <h1>Hoàng Thị Hải Anh</h1>
        <p class="title">Chuyên viên Phát triển cộng đồng</p>
        <p class="company">JOYWORK</p>

        <div class="socials">
            <a href="https://www.facebook.com/hat.vung.673299/" class="social-btn facebook" title="Facebook" target="_blank" rel="noopener noreferrer">f</a>
            <a href="https://zalo.me/0367471097" class="social-btn zalo" title="Zalo" target="_blank" rel="noopener noreferrer">Z</a>
            <a href="https://linkedin.com" class="social-btn linkedin" title="LinkedIn" target="_blank" rel="noopener noreferrer">in</a>
        </div>

        <div class="message-section">
            <h3>📝 Nhắn tin qua Telegram</h3>
            <div class="form-group">
                <label for="senderName">Tên của bạn</label>
                <input type="text" id="senderName" placeholder="Nhập tên của bạn">
            </div>
            <div class="form-group">
                <label for="senderEmail">Email (tuỳ chọn)</label>
                <input type="email" id="senderEmail" placeholder="example@domain.com">
            </div>
            <div class="form-group">
                <label for="senderMessage">Tin nhắn</label>
                <textarea id="senderMessage" placeholder="Viết nội dung tin nhắn..." required></textarea>
            </div>
            <button class="submit-btn" type="button" onclick="sendTelegramMessage()">📨 GỬI TIN</button>
            <p class="note">Trang cần deploy lên Vercel và cấu hình Telegram bot để gửi tin.</p>
            <p class="feedback" id="feedback"></p>
        </div>

        <button class="gift-btn" onclick="createConfetti()">🎁 TẶNG QUÀ</button>
        <p class="note">Bonus game: Bấm vào bong bóng pastel để mở sticker mèo siêu cute.</p>
    </div>

    <script>
        const defaultStickerUrls = [
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f63a.png',
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f638.png',
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f639.png',
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f63b.png',
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f63c.png',
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f63d.png',
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f640.png',
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f63f.png',
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f63e.png',
            'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f431.png'
        ];

        const stickerSheetCandidates = [
            'assets/sticker-sheet.png',
            'assets/sticker-sheet.jpg',
            'assets/sticker-sheet.jpeg',
            'assets/sticker-sheet.webp',
            'sticker-sheet.png',
            'sticker-sheet.jpg',
            'sticker-sheet.jpeg',
            'sticker-sheet.webp'
        ];

        let extractedStickerPool = [];

        const gameState = {
            enabled: true,
            score: 0,
            popped: 0,
            landed: 0,
            maxLanded: 30,
            combo: 1,
            maxCombo: 1,
            difficulty: 'medium',
            comboWindowMs: 1300,
            lastPopAt: 0,
            audioEnabled: true,
            audioVolume: 0.75,
            audioContext: null,
            highScore: 0
        };

        const difficultySettings = {
            easy: {
                minSize: 44,
                maxSize: 118,
                minDuration: 13.5,
                maxDuration: 21,
                minSpawnDelay: 520,
                maxSpawnDelay: 1450,
                densityFactor: 1,
                basePoints: 8
            },
            medium: {
                minSize: 34,
                maxSize: 108,
                minDuration: 10.5,
                maxDuration: 18.5,
                minSpawnDelay: 360,
                maxSpawnDelay: 1180,
                densityFactor: 1.2,
                basePoints: 10
            },
            hard: {
                minSize: 24,
                maxSize: 92,
                minDuration: 8.2,
                maxDuration: 14.4,
                minSpawnDelay: 210,
                maxSpawnDelay: 760,
                densityFactor: 1.45,
                basePoints: 12
            }
        };

        const pastelBubbleColors = [
            'rgba(255, 83, 148, 0.72)',
            'rgba(139, 92, 246, 0.7)',
            'rgba(251, 191, 36, 0.68)',
            'rgba(56, 189, 248, 0.68)',
            'rgba(236, 72, 153, 0.7)'
        ];

        function randomBetween(min, max) {
            return Math.random() * (max - min) + min;
        }

        function pickStickerSrc() {
            const source = extractedStickerPool.length > 0 ? extractedStickerPool : defaultStickerUrls;
            return source[Math.floor(Math.random() * source.length)];
        }

        function createStickerImage(src, className) {
            const img = document.createElement('img');
            img.src = src;
            img.alt = 'cat sticker';
            img.loading = 'lazy';
            img.decoding = 'async';
            img.className = className;
            return img;
        }

        function loadImageFromSource(imageEl, src) {
            return new Promise((resolve, reject) => {
                imageEl.onload = () => resolve(true);
                imageEl.onerror = () => reject(new Error('load failed'));
                imageEl.src = src;
            });
        }

        function extractStickerDataUrlsFromSheet(image) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = image.naturalWidth;
            canvas.height = image.naturalHeight;
            ctx.drawImage(image, 0, 0);

            const { width, height } = canvas;
            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;
            const total = width * height;
            const foreground = new Uint8Array(total);
            const visited = new Uint8Array(total);

            for (let i = 0; i < total; i++) {
                const idx = i * 4;
                const a = pixels[idx + 3];
                const r = pixels[idx];
                const g = pixels[idx + 1];
                const b = pixels[idx + 2];
                const bright = (r + g + b) / 3;
                const nearWhite = r > 244 && g > 244 && b > 244;
                if (a > 18 && !(nearWhite && bright > 245)) {
                    foreground[i] = 1;
                }
            }

            const queueX = [];
            const queueY = [];
            const components = [];
            const minArea = Math.max(160, Math.floor((width * height) / 26000));
            const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

            function indexOf(x, y) {
                return y * width + x;
            }

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const start = indexOf(x, y);
                    if (!foreground[start] || visited[start]) {
                        continue;
                    }

                    let minX = x;
                    let maxX = x;
                    let minY = y;
                    let maxY = y;
                    let count = 0;

                    queueX.length = 0;
                    queueY.length = 0;
                    queueX.push(x);
                    queueY.push(y);
                    visited[start] = 1;

                    while (queueX.length) {
                        const cx = queueX.pop();
                        const cy = queueY.pop();
                        count += 1;

                        if (cx < minX) minX = cx;
                        if (cx > maxX) maxX = cx;
                        if (cy < minY) minY = cy;
                        if (cy > maxY) maxY = cy;

                        for (const [dx, dy] of dirs) {
                            const nx = cx + dx;
                            const ny = cy + dy;
                            if (nx < 0 || nx >= width || ny < 0 || ny >= height) {
                                continue;
                            }
                            const nIndex = indexOf(nx, ny);
                            if (!foreground[nIndex] || visited[nIndex]) {
                                continue;
                            }
                            visited[nIndex] = 1;
                            queueX.push(nx);
                            queueY.push(ny);
                        }
                    }

                    if (count >= minArea) {
                        components.push({ minX, maxX, minY, maxY, count });
                    }
                }
            }

            const extracted = [];
            for (const box of components) {
                const pad = 6;
                const sx = Math.max(0, box.minX - pad);
                const sy = Math.max(0, box.minY - pad);
                const sw = Math.min(width - sx, box.maxX - box.minX + (pad * 2));
                const sh = Math.min(height - sy, box.maxY - box.minY + (pad * 2));

                const stickerCanvas = document.createElement('canvas');
                stickerCanvas.width = sw;
                stickerCanvas.height = sh;
                const stickerCtx = stickerCanvas.getContext('2d');
                const part = ctx.getImageData(sx, sy, sw, sh);
                stickerCtx.putImageData(part, 0, 0);
                extracted.push(stickerCanvas.toDataURL('image/png'));
            }

            return extracted;
        }

        async function buildStickersFromSheet() {
            const sheet = document.getElementById('stickerSheet');
            if (!sheet) {
                return;
            }

            try {
                let loaded = false;
                for (const candidate of stickerSheetCandidates) {
                    try {
                        await loadImageFromSource(sheet, candidate);
                        loaded = true;
                        break;
                    } catch (error) {
                        loaded = false;
                    }
                }

                if (!loaded || !sheet.naturalWidth) {
                    extractedStickerPool = [];
                    return;
                }

                const extracted = extractStickerDataUrlsFromSheet(sheet);
                if (extracted.length > 0) {
                    extractedStickerPool = extracted;
                }
            } catch (error) {
                extractedStickerPool = [];
            }
        }

        function updateScoreboard() {
            document.getElementById('scoreValue').textContent = String(gameState.score);
            document.getElementById('highScoreValue').textContent = String(gameState.highScore);
            document.getElementById('comboValue').textContent = `x${gameState.combo}`;
            document.getElementById('poppedValue').textContent = String(gameState.popped);
            document.getElementById('landedValue').textContent = String(gameState.landed);
        }

        function persistGamePrefs() {
            const payload = {
                highScore: gameState.highScore,
                difficulty: gameState.difficulty,
                audioEnabled: gameState.audioEnabled,
                audioVolume: gameState.audioVolume
            };
            localStorage.setItem('digitalProfileBubbleGame', JSON.stringify(payload));
        }

        function loadGamePrefs() {
            const raw = localStorage.getItem('digitalProfileBubbleGame');
            if (!raw) {
                return;
            }

            try {
                const saved = JSON.parse(raw);
                gameState.highScore = Number(saved.highScore) || 0;
                gameState.difficulty = difficultySettings[saved.difficulty] ? saved.difficulty : 'medium';
                gameState.audioEnabled = saved.audioEnabled !== false;
                const parsedVolume = Number(saved.audioVolume);
                if (!Number.isNaN(parsedVolume)) {
                    gameState.audioVolume = Math.min(1, Math.max(0, parsedVolume));
                }
            } catch (error) {
                localStorage.removeItem('digitalProfileBubbleGame');
            }
        }

        function getDifficultyConfig() {
            return difficultySettings[gameState.difficulty] || difficultySettings.medium;
        }

        function ensureAudioContext() {
            if (!window.AudioContext && !window.webkitAudioContext) {
                return null;
            }

            if (!gameState.audioContext) {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                gameState.audioContext = new AudioCtx();
            }

            if (gameState.audioContext.state === 'suspended') {
                gameState.audioContext.resume();
            }

            return gameState.audioContext;
        }

        function playPopSound() {
            if (!gameState.audioEnabled) {
                return;
            }

            const audioCtx = ensureAudioContext();
            if (!audioCtx) {
                return;
            }

            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.2 * gameState.audioVolume, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.19);
            gain.connect(audioCtx.destination);

            const osc1 = audioCtx.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(770, now);
            osc1.frequency.exponentialRampToValueAtTime(510, now + 0.18);
            osc1.connect(gain);

            const osc2 = audioCtx.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(1120, now);
            osc2.frequency.exponentialRampToValueAtTime(760, now + 0.13);
            osc2.connect(gain);

            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 0.2);
            osc2.stop(now + 0.16);
        }

        function toggleSound() {
            gameState.audioEnabled = !gameState.audioEnabled;
            const button = document.getElementById('soundToggleBtn');
            button.textContent = gameState.audioEnabled ? '🔊' : '🔇';
            button.classList.toggle('off', !gameState.audioEnabled);
            if (gameState.audioEnabled) {
                ensureAudioContext();
            }
            persistGamePrefs();
        }

        function setVolume(volumePercent) {
            const normalized = Math.min(1, Math.max(0, volumePercent / 100));
            gameState.audioVolume = normalized;
            persistGamePrefs();
        }

        function setDifficulty(level) {
            gameState.difficulty = difficultySettings[level] ? level : 'medium';
            document.querySelectorAll('.soap-bubble').forEach((bubble) => bubble.remove());
            initBubbleGame();
            persistGamePrefs();
        }

        function toggleMiniGame() {
            const button = document.getElementById('toggleGameBtn');
            gameState.enabled = !gameState.enabled;

            if (gameState.enabled) {
                button.textContent = 'Tat mini game';
                button.classList.remove('off');
                initBubbleGame();
                return;
            }

            button.textContent = 'Bat mini game';
            button.classList.add('off');
            gameState.combo = 1;
            updateScoreboard();
            document.querySelectorAll('.soap-bubble').forEach((bubble) => bubble.remove());
        }

        function createBubble() {
            if (!gameState.enabled) {
                return;
            }

            const layer = document.getElementById('bubbleGameLayer');
            if (!layer) {
                return;
            }

            const bubble = document.createElement('button');
            bubble.type = 'button';
            bubble.className = 'soap-bubble';
            const cfg = getDifficultyConfig();

            const size = randomBetween(cfg.minSize, cfg.maxSize);
            const left = randomBetween(2, 96);
            const drift = randomBetween(-90, 90);
            const duration = randomBetween(cfg.minDuration, cfg.maxDuration);
            const delay = randomBetween(0, 4.6);
            const color = pastelBubbleColors[Math.floor(Math.random() * pastelBubbleColors.length)];
            const stickerSrc = pickStickerSrc();

            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${left}vw`;
            bubble.style.background = `radial-gradient(circle at 30% 30%, rgba(255,255,255,0.85), ${color})`;
            bubble.style.setProperty('--drift-x', `${drift}px`);
            bubble.style.animationDuration = `${duration}s`;
            bubble.style.animationDelay = `${delay}s`;
            bubble.dataset.stickerSrc = stickerSrc;

            bubble.addEventListener('click', (event) => {
                popBubble(bubble, event.clientX, event.clientY);
            });

            bubble.addEventListener('animationend', () => {
                bubble.remove();
                if (gameState.enabled) {
                    setTimeout(createBubble, randomBetween(cfg.minSpawnDelay, cfg.maxSpawnDelay));
                }
            });

            layer.appendChild(bubble);
        }

        function popBubble(bubble, x, y) {
            if (!bubble || bubble.dataset.popped === '1') {
                return;
            }

            bubble.dataset.popped = '1';
            bubble.style.pointerEvents = 'none';

            if (bubble && bubble.parentNode) {
                bubble.parentNode.removeChild(bubble);
            }

            if (!gameState.enabled) {
                return;
            }

            const now = Date.now();
            if (now - gameState.lastPopAt <= gameState.comboWindowMs) {
                gameState.combo += 1;
            } else {
                gameState.combo = 1;
            }
            gameState.lastPopAt = now;
            gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);

            const cfg = getDifficultyConfig();
            const comboMultiplier = Math.min(3.5, 1 + ((gameState.combo - 1) * 0.22));
            const earnedPoints = Math.round(cfg.basePoints * comboMultiplier);
            const stickerSrc = bubble && bubble.dataset ? bubble.dataset.stickerSrc : pickStickerSrc();

            gameState.popped += 1;
            gameState.score += earnedPoints;
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                persistGamePrefs();
            }
            updateScoreboard();
            playPopSound();
            showComboFlash(gameState.combo, earnedPoints, x, y);

            const pop = document.createElement('span');
            pop.className = 'bubble-pop';
            pop.style.left = `${x}px`;
            pop.style.top = `${y}px`;
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 450);

            dropKittyToGround(x, y, stickerSrc);
            setTimeout(createBubble, randomBetween(cfg.minSpawnDelay, cfg.maxSpawnDelay));
        }

        function showKittyBurst(x, y, stickerSrc) {
            const layer = document.getElementById('kittyBurstLayer');
            const kitty = document.createElement('div');
            kitty.className = 'kitty-burst';
            kitty.style.left = `${x}px`;
            kitty.style.top = `${y}px`;
            kitty.appendChild(createStickerImage(stickerSrc, 'kitty-sticker-img'));
            layer.appendChild(kitty);
            setTimeout(() => kitty.remove(), 1150);
        }

        function dropKittyToGround(x, y, stickerSrc) {
            const falling = document.createElement('div');
            falling.className = 'kitty-falling';
            falling.style.left = `${x}px`;
            falling.style.top = `${y}px`;
            falling.appendChild(createStickerImage(stickerSrc, 'kitty-sticker-img'));
            document.body.appendChild(falling);

            const targetY = window.innerHeight - randomBetween(46, 108);
            const drift = randomBetween(-70, 70);

            requestAnimationFrame(() => {
                falling.style.top = `${targetY}px`;
                falling.style.transform = `translate(-50%, -50%) translateX(${drift}px) rotate(${randomBetween(-10, 10)}deg)`;
            });

            setTimeout(() => {
                if (!falling.parentNode) {
                    return;
                }
                const finalLeft = x + drift;
                falling.remove();
                placeLandedKitty(finalLeft, stickerSrc);
            }, 900);
        }

        function showComboFlash(comboCount, points, x, y) {
            if (comboCount < 2) {
                return;
            }

            const layer = document.getElementById('comboFlashLayer');
            const flash = document.createElement('div');
            flash.className = 'combo-flash';
            flash.textContent = `Combo x${comboCount} +${points}`;
            flash.style.left = `${Math.max(80, Math.min(window.innerWidth - 80, x))}px`;
            flash.style.top = `${Math.max(80, Math.min(window.innerHeight - 200, y - 32))}px`;
            layer.appendChild(flash);
            setTimeout(() => flash.remove(), 760);
        }

        function placeLandedKitty(x, stickerSrc) {
            const ground = document.getElementById('kittyGroundLayer');
            const landed = document.createElement('div');
            landed.className = 'kitty-landed';
            landed.style.left = `${Math.max(36, Math.min(window.innerWidth - 36, x))}px`;
            landed.appendChild(createStickerImage(stickerSrc, 'kitty-sticker-img'));
            ground.appendChild(landed);

            gameState.landed += 1;
            updateScoreboard();

            const landedItems = ground.querySelectorAll('.kitty-landed');
            if (landedItems.length > gameState.maxLanded) {
                landedItems[0].remove();
                gameState.landed = Math.max(0, gameState.landed - 1);
                updateScoreboard();
            }
        }

        function initBubbleGame() {
            if (!gameState.enabled) {
                return;
            }

            const existing = document.querySelectorAll('.soap-bubble').length;
            if (existing > 4) {
                return;
            }

            const cfg = getDifficultyConfig();

            const baseCount = Math.round((window.innerWidth * window.innerHeight) / 52000);
            const bubbleCount = Math.max(14, Math.min(34, Math.round(baseCount * cfg.densityFactor)));
            for (let i = 0; i < bubbleCount; i++) {
                setTimeout(createBubble, i * 220);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadGamePrefs();
            updateScoreboard();
            document.getElementById('toggleGameBtn').addEventListener('click', toggleMiniGame);
            document.getElementById('difficultySelect').addEventListener('change', (event) => {
                setDifficulty(event.target.value);
            });
            document.getElementById('soundToggleBtn').addEventListener('click', toggleSound);
            document.getElementById('volumeSlider').addEventListener('input', (event) => {
                setVolume(Number(event.target.value));
            });

            document.getElementById('difficultySelect').value = gameState.difficulty;
            document.getElementById('volumeSlider').value = Math.round(gameState.audioVolume * 100);
            document.getElementById('soundToggleBtn').textContent = gameState.audioEnabled ? '🔊' : '🔇';
            document.getElementById('soundToggleBtn').classList.toggle('off', !gameState.audioEnabled);

            initBubbleGame();

            buildStickersFromSheet().then(() => {
                // After extraction, refresh any existing unpopped bubbles so they use custom stickers.
                if (extractedStickerPool.length > 0) {
                    document.querySelectorAll('.soap-bubble').forEach(bubble => {
                        if (bubble.dataset.popped !== '1') {
                            bubble.dataset.stickerSrc = pickStickerSrc();
                        }
                    });
                }
            });
        });

        async function sendTelegramMessage() {
            const name = document.getElementById('senderName').value.trim();
            const email = document.getElementById('senderEmail').value.trim();
            const message = document.getElementById('senderMessage').value.trim();
            const feedback = document.getElementById('feedback');

            if (!message) {
                feedback.textContent = 'Vui lòng nhập nội dung tin nhắn.';
                return;
            }

            feedback.textContent = 'Đang gửi tin nhắn...';

            try {
                const response = await fetch('/api/send-telegram', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, message })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Không gửi được tin nhắn');
                }

                feedback.textContent = '✅ Tin nhắn đã gửi thành công. Mình sẽ trả lời sớm!';
                document.getElementById('senderMessage').value = '';
                createConfetti();
            } catch (error) {
                feedback.textContent = '⚠️ ' + error.message;
            }
        }

        function createConfetti() {
            const colors = ['#fbbf24', '#f472b6', '#a78bfa', '#fca5a5', '#f59e0b'];
            const confettiCount = 50;

            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animation = 'confettiFall ' + (Math.random() * 2 + 2) + 's ease-out forwards';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0px';
                    document.body.appendChild(confetti);

                    setTimeout(() => {
                        confetti.remove();
                    }, 4000);
                }, i * 30);
            }
        }
    </script>
