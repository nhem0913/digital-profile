<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoàng Thị Hải Anh - Digital Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 34px;
            padding: 40px 36px 36px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 24px 70px rgba(149, 76, 233, 0.18);
            text-align: center;
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 15;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 28px;
            border: 5px solid #fbbf24;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(251, 191, 36, 0.25);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #9333ea;
            font-size: 30px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .title {
            color: #d946ef;
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .company {
            color: #a78bfa;
            font-size: 14px;
            margin-bottom: 28px;
            font-style: italic;
        }

        .socials {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .facebook {
            background: linear-gradient(135deg, #c084fc 0%, #a78bfa 100%);
        }

        .zalo {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        }

        .linkedin {
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
        }

        .social-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
        }

        .message-section {
            background: #ffffff;
            border-radius: 28px;
            padding: 28px 24px;
            margin-top: 30px;
            box-shadow: 0 16px 46px rgba(167, 139, 250, 0.14);
            text-align: left;
        }

        .message-section h3 {
            color: #7c3aed;
            font-size: 22px;
            margin-bottom: 18px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #5b21b6;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(167, 139, 250, 0.5);
            border-radius: 18px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            transition: all 0.25s ease;
            box-sizing: border-box;
            background: #faf5ff;
            color: #2d2d2d;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #c084fc;
            box-shadow: 0 0 12px rgba(192, 132, 250, 0.18);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #a78bfa 0%, #9333ea 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(147, 51, 234, 0.24);
            width: 100%;
            margin-top: 6px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 36px rgba(147, 51, 234, 0.32);
        }

        .feedback {
            margin-top: 16px;
            min-height: 22px;
            font-size: 14px;
            color: #4c1d95;
            text-align: center;
        }

        .note {
            font-size: 13px;
            color: #7c3aed;
            opacity: 0.85;
            margin-top: 12px;
            text-align: center;
        }

        .gift-btn {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.3);
            width: 100%;
            margin-top: 20px;
        }

        .gift-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(249, 115, 22, 0.4);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
            z-index: 25;
        }

        .bubble-game-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            overflow: hidden;
        }

        .soap-bubble {
            position: fixed;
            bottom: -140px;
            border: 0;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            opacity: 0.88;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.4),
                inset -10px -12px 20px rgba(255, 255, 255, 0.25),
                0 10px 24px rgba(139, 92, 246, 0.12);
            animation-name: bubbleFloat;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
            transition: transform 0.15s ease;
        }

        .soap-bubble::before {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            border-radius: 50%;
            top: 14%;
            left: 18%;
            background: rgba(255, 255, 255, 0.65);
            filter: blur(1px);
        }

        .soap-bubble:hover {
            transform: scale(1.08);
        }

        .kitty-burst-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 30;
            overflow: hidden;
        }

        .kitty-ground-layer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 165px;
            pointer-events: none;
            z-index: 24;
            overflow: visible;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(252, 231, 243, 0.55) 70%, rgba(251, 207, 232, 0.7) 100%);
        }

        .game-hud {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 40;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: min(260px, calc(100vw - 24px));
        }

        .game-card {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 12px 14px;
            box-shadow: 0 14px 34px rgba(167, 139, 250, 0.2);
            backdrop-filter: blur(6px);
        }

        .game-title {
            color: #9d174d;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .game-control {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .game-control label {
            color: #7e22ce;
            font-size: 12px;
            font-weight: 700;
        }

        .difficulty-select {
            flex: 1;
            border: 1px solid rgba(167, 139, 250, 0.45);
            border-radius: 10px;
            background: #faf5ff;
            color: #5b21b6;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 10px;
        }

        .sound-toggle {
            border: 0;
            border-radius: 10px;
            padding: 8px 10px;
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
            color: white;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .sound-toggle.off {
            background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            color: #7e22ce;
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
        }

        .game-toggle {
            border: 0;
            border-radius: 12px;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
            transition: transform 0.2s ease;
        }

        .game-toggle:hover {
            transform: translateY(-1px);
        }

        .game-toggle.off {
            background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
        }

        .kitty-burst {
            position: fixed;
            transform: translate(-50%, -50%);
            display: grid;
            place-items: center;
            width: 94px;
            height: 94px;
            border-radius: 26px;
            background: linear-gradient(145deg, rgba(255, 245, 251, 0.95), rgba(250, 239, 255, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(244, 114, 182, 0.25);
            animation: kittyPop 1.15s ease forwards;
            backdrop-filter: blur(3px);
        }

        .kitty-face {
            font-size: 34px;
            line-height: 1;
        }

        .kitty-caption {
            font-size: 12px;
            color: #be185d;
            font-weight: 700;
            margin-top: 4px;
        }

        .bubble-pop {
            position: fixed;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.25);
            animation: popRing 0.45s ease-out forwards;
            pointer-events: none;
            z-index: 28;
        }

        .kitty-falling {
            position: fixed;
            transform: translate(-50%, -50%);
            z-index: 29;
            pointer-events: none;
            display: grid;
            place-items: center;
            width: 82px;
            height: 82px;
            border-radius: 22px;
            background: rgba(255, 250, 253, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 12px 26px rgba(236, 72, 153, 0.22);
            transition: top 0.9s cubic-bezier(0.2, 0.65, 0.25, 1), transform 0.9s cubic-bezier(0.2, 0.65, 0.25, 1);
        }

        .kitty-landed {
            position: absolute;
            bottom: 6px;
            transform: translateX(-50%);
            display: grid;
            place-items: center;
            width: 70px;
            height: 70px;
            border-radius: 18px;
            background: rgba(255, 250, 253, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 18px rgba(236, 72, 153, 0.2);
            animation: settleBounce 0.55s ease;
        }

        @keyframes bubbleFloat {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
                opacity: 0;
            }
            12% {
                opacity: 0.85;
            }
            50% {
                transform: translate3d(calc(var(--drift-x) * 0.55), -52vh, 0) scale(1.03);
            }
            100% {
                transform: translate3d(var(--drift-x), -122vh, 0) scale(0.98);
                opacity: 0.15;
            }
        }

        @keyframes kittyPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2) rotate(-8deg);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.06) rotate(4deg);
            }
            70% {
                opacity: 1;
                transform: translate(-50%, -64%) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -88%) scale(0.82) rotate(0deg);
            }
        }

        @keyframes popRing {
            to {
                width: 90px;
                height: 90px;
                opacity: 0;
            }
        }

        @keyframes settleBounce {
            0% {
                transform: translateX(-50%) translateY(-28px) scale(0.92);
            }
            62% {
                transform: translateX(-50%) translateY(6px) scale(1.02);
            }
            100% {
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="bubble-game-layer" id="bubbleGameLayer"></div>
    <div class="kitty-burst-layer" id="kittyBurstLayer"></div>
    <div class="kitty-ground-layer" id="kittyGroundLayer"></div>

    <aside class="game-hud">
        <div class="game-card">
            <div class="game-title">Mini Game Bong Bong Meo</div>
            <div class="score-row"><span>Diem</span><span id="scoreValue">0</span></div>
            <div class="score-row"><span>Combo</span><span id="comboValue">x1</span></div>
            <div class="score-row"><span>Bong da no</span><span id="poppedValue">0</span></div>
            <div class="score-row"><span>Sticker duoi dat</span><span id="landedValue">0</span></div>
            <div class="game-control">
                <label for="difficultySelect">Do kho</label>
                <select id="difficultySelect" class="difficulty-select">
                    <option value="easy">De</option>
                    <option value="medium" selected>Vua</option>
                    <option value="hard">Kho</option>
                </select>
                <button id="soundToggleBtn" class="sound-toggle" type="button">Am thanh: Bat</button>
            </div>
        </div>
        <button id="toggleGameBtn" class="game-toggle" type="button">Tat mini game</button>
    </aside>

    <div class="container">
        <div class="avatar">
            <img src="https://scontent.fhan14-3.fna.fbcdn.net/v/t39.30808-6/605926480_1354087222859680_3699929218445589501_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=7b2446&_nc_ohc=MGxSvf5mPcgQ7kNvwFcKMje&_nc_oc=Adov6TMyxudguLJ2ML_LL23jfdvbnaPdQ_6uIh_PvTetJEPRvFPqhWqlq8_MwNx5vCc7GaksLQ6C0m5tJ12EOAyG&_nc_zt=23&_nc_ht=scontent.fhan14-3.fna&_nc_gid=HBuUMX0swEXRDGoK97LxOA&_nc_ss=7a3a8&oh=00_Af2tjgj4paFRj2-d0J0cwRHy495TlYvW-Iln4hB2yLrPYg&oe=69DD14B8" alt="Hoàng Thị Hải Anh">
        </div>
        <h1>Hoàng Thị Hải Anh</h1>
        <p class="title">Chuyên viên Phát triển cộng đồng</p>
        <p class="company">JOYWORK</p>

        <div class="socials">
            <a href="https://www.facebook.com/hat.vung.673299/" class="social-btn facebook" title="Facebook" target="_blank" rel="noopener noreferrer">f</a>
            <a href="https://zalo.me/0367471097" class="social-btn zalo" title="Zalo" target="_blank" rel="noopener noreferrer">Z</a>
            <a href="https://linkedin.com" class="social-btn linkedin" title="LinkedIn" target="_blank" rel="noopener noreferrer">in</a>
        </div>

        <div class="message-section">
            <h3>📝 Nhắn tin qua Telegram</h3>
            <div class="form-group">
                <label for="senderName">Tên của bạn</label>
                <input type="text" id="senderName" placeholder="Nhập tên của bạn">
            </div>
            <div class="form-group">
                <label for="senderEmail">Email (tuỳ chọn)</label>
                <input type="email" id="senderEmail" placeholder="example@domain.com">
            </div>
            <div class="form-group">
                <label for="senderMessage">Tin nhắn</label>
                <textarea id="senderMessage" placeholder="Viết nội dung tin nhắn..." required></textarea>
            </div>
            <button class="submit-btn" type="button" onclick="sendTelegramMessage()">📨 GỬI TIN</button>
            <p class="note">Trang cần deploy lên Vercel và cấu hình Telegram bot để gửi tin.</p>
            <p class="feedback" id="feedback"></p>
        </div>

        <button class="gift-btn" onclick="createConfetti()">🎁 TẶNG QUÀ</button>
        <p class="note">Bonus game: Bấm vào bong bóng pastel để mở sticker mèo siêu cute.</p>
    </div>

    <script>
        const kittyFaces = [
            { face: '😺', caption: 'Xin chaooo!' },
            { face: '😸', caption: 'Hehe!' },
            { face: '😻', caption: 'Yeu ban!' },
            { face: '🎀😺', caption: 'Kitty mode' },
            { face: 'ฅ^•ﻌ•^ฅ', caption: 'Meo~' },
            { face: '(=^･ω･^=)', caption: 'Tinh nghich' },
            { face: '😽', caption: 'Chut chiu!' }
        ];

        const gameState = {
            enabled: true,
            score: 0,
            popped: 0,
            landed: 0,
            maxLanded: 30,
            combo: 1,
            maxCombo: 1,
            difficulty: 'medium',
            comboWindowMs: 1300,
            lastPopAt: 0,
            audioEnabled: true,
            audioContext: null
        };

        const difficultySettings = {
            easy: {
                minSize: 44,
                maxSize: 118,
                minDuration: 13.5,
                maxDuration: 21,
                minSpawnDelay: 520,
                maxSpawnDelay: 1450,
                densityFactor: 1,
                basePoints: 8
            },
            medium: {
                minSize: 34,
                maxSize: 108,
                minDuration: 10.5,
                maxDuration: 18.5,
                minSpawnDelay: 360,
                maxSpawnDelay: 1180,
                densityFactor: 1.2,
                basePoints: 10
            },
            hard: {
                minSize: 24,
                maxSize: 92,
                minDuration: 8.2,
                maxDuration: 14.4,
                minSpawnDelay: 210,
                maxSpawnDelay: 760,
                densityFactor: 1.45,
                basePoints: 12
            }
        };

        const pastelBubbleColors = [
            'rgba(255, 192, 203, 0.26)',
            'rgba(196, 181, 253, 0.24)',
            'rgba(253, 230, 138, 0.22)',
            'rgba(186, 230, 253, 0.24)',
            'rgba(251, 207, 232, 0.24)'
        ];

        function randomBetween(min, max) {
            return Math.random() * (max - min) + min;
        }

        function updateScoreboard() {
            document.getElementById('scoreValue').textContent = String(gameState.score);
            document.getElementById('comboValue').textContent = `x${gameState.combo}`;
            document.getElementById('poppedValue').textContent = String(gameState.popped);
            document.getElementById('landedValue').textContent = String(gameState.landed);
        }

        function getDifficultyConfig() {
            return difficultySettings[gameState.difficulty] || difficultySettings.medium;
        }

        function ensureAudioContext() {
            if (!window.AudioContext && !window.webkitAudioContext) {
                return null;
            }

            if (!gameState.audioContext) {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                gameState.audioContext = new AudioCtx();
            }

            if (gameState.audioContext.state === 'suspended') {
                gameState.audioContext.resume();
            }

            return gameState.audioContext;
        }

        function playPopSound() {
            if (!gameState.audioEnabled) {
                return;
            }

            const audioCtx = ensureAudioContext();
            if (!audioCtx) {
                return;
            }

            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.2, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.19);
            gain.connect(audioCtx.destination);

            const osc1 = audioCtx.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(770, now);
            osc1.frequency.exponentialRampToValueAtTime(510, now + 0.18);
            osc1.connect(gain);

            const osc2 = audioCtx.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(1120, now);
            osc2.frequency.exponentialRampToValueAtTime(760, now + 0.13);
            osc2.connect(gain);

            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 0.2);
            osc2.stop(now + 0.16);
        }

        function toggleSound() {
            gameState.audioEnabled = !gameState.audioEnabled;
            const button = document.getElementById('soundToggleBtn');
            button.textContent = gameState.audioEnabled ? 'Am thanh: Bat' : 'Am thanh: Tat';
            button.classList.toggle('off', !gameState.audioEnabled);
            if (gameState.audioEnabled) {
                ensureAudioContext();
            }
        }

        function setDifficulty(level) {
            gameState.difficulty = difficultySettings[level] ? level : 'medium';
            document.querySelectorAll('.soap-bubble').forEach((bubble) => bubble.remove());
            initBubbleGame();
        }

        function toggleMiniGame() {
            const button = document.getElementById('toggleGameBtn');
            gameState.enabled = !gameState.enabled;

            if (gameState.enabled) {
                button.textContent = 'Tat mini game';
                button.classList.remove('off');
                initBubbleGame();
                return;
            }

            button.textContent = 'Bat mini game';
            button.classList.add('off');
            document.querySelectorAll('.soap-bubble').forEach((bubble) => bubble.remove());
        }

        function createBubble() {
            if (!gameState.enabled) {
                return;
            }

            const layer = document.getElementById('bubbleGameLayer');
            if (!layer) {
                return;
            }

            const bubble = document.createElement('button');
            bubble.type = 'button';
            bubble.className = 'soap-bubble';
            const cfg = getDifficultyConfig();

            const size = randomBetween(cfg.minSize, cfg.maxSize);
            const left = randomBetween(2, 96);
            const drift = randomBetween(-90, 90);
            const duration = randomBetween(cfg.minDuration, cfg.maxDuration);
            const delay = randomBetween(0, 4.6);
            const color = pastelBubbleColors[Math.floor(Math.random() * pastelBubbleColors.length)];

            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${left}vw`;
            bubble.style.background = `radial-gradient(circle at 30% 30%, rgba(255,255,255,0.85), ${color})`;
            bubble.style.setProperty('--drift-x', `${drift}px`);
            bubble.style.animationDuration = `${duration}s`;
            bubble.style.animationDelay = `${delay}s`;

            bubble.addEventListener('click', (event) => {
                popBubble(bubble, event.clientX, event.clientY);
            });

            bubble.addEventListener('animationend', () => {
                bubble.remove();
                if (gameState.enabled) {
                    setTimeout(createBubble, randomBetween(cfg.minSpawnDelay, cfg.maxSpawnDelay));
                }
            });

            layer.appendChild(bubble);
        }

        function popBubble(bubble, x, y) {
            if (bubble && bubble.parentNode) {
                bubble.parentNode.removeChild(bubble);
            }

            if (!gameState.enabled) {
                return;
            }

            const now = Date.now();
            if (now - gameState.lastPopAt <= gameState.comboWindowMs) {
                gameState.combo += 1;
            } else {
                gameState.combo = 1;
            }
            gameState.lastPopAt = now;
            gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);

            const cfg = getDifficultyConfig();
            const comboMultiplier = Math.min(3.5, 1 + ((gameState.combo - 1) * 0.22));
            const earnedPoints = Math.round(cfg.basePoints * comboMultiplier);

            gameState.popped += 1;
            gameState.score += earnedPoints;
            updateScoreboard();
            playPopSound();

            const pop = document.createElement('span');
            pop.className = 'bubble-pop';
            pop.style.left = `${x}px`;
            pop.style.top = `${y}px`;
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 450);

            showKittyBurst(x, y);
            dropKittyToGround(x, y);
            setTimeout(createBubble, randomBetween(cfg.minSpawnDelay, cfg.maxSpawnDelay));
        }

        function showKittyBurst(x, y) {
            const layer = document.getElementById('kittyBurstLayer');
            const selected = kittyFaces[Math.floor(Math.random() * kittyFaces.length)];
            const kitty = document.createElement('div');
            kitty.className = 'kitty-burst';
            kitty.style.left = `${x}px`;
            kitty.style.top = `${y}px`;
            kitty.innerHTML = `<div class="kitty-face">${selected.face}</div><div class="kitty-caption">${selected.caption}</div>`;
            layer.appendChild(kitty);
            setTimeout(() => kitty.remove(), 1150);
        }

        function dropKittyToGround(x, y) {
            const selected = kittyFaces[Math.floor(Math.random() * kittyFaces.length)];
            const falling = document.createElement('div');
            falling.className = 'kitty-falling';
            falling.style.left = `${x}px`;
            falling.style.top = `${y}px`;
            falling.innerHTML = `<div class="kitty-face">${selected.face}</div><div class="kitty-caption">${selected.caption}</div>`;
            document.body.appendChild(falling);

            const targetY = window.innerHeight - randomBetween(46, 108);
            const drift = randomBetween(-70, 70);

            requestAnimationFrame(() => {
                falling.style.top = `${targetY}px`;
                falling.style.transform = `translate(-50%, -50%) translateX(${drift}px) rotate(${randomBetween(-10, 10)}deg)`;
            });

            setTimeout(() => {
                if (!falling.parentNode) {
                    return;
                }
                const finalLeft = x + drift;
                falling.remove();
                placeLandedKitty(finalLeft, selected);
            }, 900);
        }

        function placeLandedKitty(x, selected) {
            const ground = document.getElementById('kittyGroundLayer');
            const landed = document.createElement('div');
            landed.className = 'kitty-landed';
            landed.style.left = `${Math.max(36, Math.min(window.innerWidth - 36, x))}px`;
            landed.innerHTML = `<div class="kitty-face">${selected.face}</div>`;
            ground.appendChild(landed);

            gameState.landed += 1;
            updateScoreboard();

            const landedItems = ground.querySelectorAll('.kitty-landed');
            if (landedItems.length > gameState.maxLanded) {
                landedItems[0].remove();
                gameState.landed = Math.max(0, gameState.landed - 1);
                updateScoreboard();
            }
        }

        function initBubbleGame() {
            if (!gameState.enabled) {
                return;
            }

            const existing = document.querySelectorAll('.soap-bubble').length;
            if (existing > 4) {
                return;
            }

            const cfg = getDifficultyConfig();

            const baseCount = Math.round((window.innerWidth * window.innerHeight) / 52000);
            const bubbleCount = Math.max(14, Math.min(34, Math.round(baseCount * cfg.densityFactor)));
            for (let i = 0; i < bubbleCount; i++) {
                setTimeout(createBubble, i * 220);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateScoreboard();
            document.getElementById('toggleGameBtn').addEventListener('click', toggleMiniGame);
            document.getElementById('difficultySelect').addEventListener('change', (event) => {
                setDifficulty(event.target.value);
            });
            document.getElementById('soundToggleBtn').addEventListener('click', toggleSound);
            initBubbleGame();
        });

        async function sendTelegramMessage() {
            const name = document.getElementById('senderName').value.trim();
            const email = document.getElementById('senderEmail').value.trim();
            const message = document.getElementById('senderMessage').value.trim();
            const feedback = document.getElementById('feedback');

            if (!message) {
                feedback.textContent = 'Vui lòng nhập nội dung tin nhắn.';
                return;
            }

            feedback.textContent = 'Đang gửi tin nhắn...';

            try {
                const response = await fetch('/api/send-telegram', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, message })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Không gửi được tin nhắn');
                }

                feedback.textContent = '✅ Tin nhắn đã gửi thành công. Mình sẽ trả lời sớm!';
                document.getElementById('senderMessage').value = '';
                createConfetti();
            } catch (error) {
                feedback.textContent = '⚠️ ' + error.message;
            }
        }

        function createConfetti() {
            const colors = ['#fbbf24', '#f472b6', '#a78bfa', '#fca5a5', '#f59e0b'];
            const confettiCount = 50;

            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animation = 'confettiFall ' + (Math.random() * 2 + 2) + 's ease-out forwards';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0px';
                    document.body.appendChild(confetti);

                    setTimeout(() => {
                        confetti.remove();
                    }, 4000);
                }, i * 30);
            }
        }
    </script>
</body>
